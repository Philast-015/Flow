<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Flow Music</title>
        <link rel="stylesheet" href="/static/style.css" />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
        />
    </head>
    <body>
        <div id="app" class="full-player">
            <div class="player-main" id="playerMain">
                <div class="player-bg" id="playerBg"></div>
                <div class="scanlines"></div>
                <div class="player-content">
                    <div class="pixel-frame">
                        <div class="artwork" id="artwork">
                            <img
                                id="albumArt"
                                src="/static/Frame%201.jpg"
                                alt=""
                            />
                        </div>
                        <div class="frame-corner tl"></div>
                        <div class="frame-corner tr"></div>
                        <div class="frame-corner bl"></div>
                        <div class="frame-corner br"></div>
                    </div>

                    <div class="pixel-wave">
                        <span></span><span></span><span></span><span></span>
                        <span></span><span></span><span></span><span></span>
                        <span></span><span></span><span></span><span></span>
                        <span></span><span></span><span></span><span></span>
                    </div>

                    <div class="track-info">
                        <div class="track-title-wrap">
                            <h2 id="trackTitle" class="track-title">
                                Flow Music
                            </h2>
                        </div>
                        <p id="trackArtist" class="track-artist"></p>
                    </div>

                    <div class="player-controls">
                        <button
                            id="shuffleBtn"
                            class="ctrl-btn"
                            title="Shuffle"
                        >
                            <i class="bi bi-shuffle"></i>
                        </button>
                        <button id="prevBtn" class="ctrl-btn" title="Previous">
                            <i class="bi bi-skip-start-fill"></i>
                        </button>
                        <button
                            id="playBtn"
                            class="ctrl-btn play-btn"
                            title="Play/Pause"
                        >
                            <span class="btn-pixel-border"></span>
                            <i class="bi bi-play-fill play-icon"></i>
                        </button>
                        <button id="nextBtn" class="ctrl-btn" title="Next">
                            <i class="bi bi-skip-end-fill"></i>
                        </button>
                        <button id="repeatBtn" class="ctrl-btn" title="Repeat">
                            <i class="bi bi-repeat"></i>
                        </button>
                        <button
                            id="downloadBtn"
                            class="ctrl-btn"
                            title="Download"
                        >
                            <i class="bi bi-download"></i>
                        </button>
                    </div>

                    <div class="progress-area">
                        <span class="time" id="currentTime">0:00</span>
                        <div class="progress-bar" id="progressBar">
                            <div class="progress-fill" id="progressFill"></div>
                            <div class="progress-ticks">
                                <span></span><span></span><span></span
                                ><span></span><span></span> <span></span
                                ><span></span><span></span><span></span
                                ><span></span>
                            </div>
                        </div>
                        <span class="time" id="totalTime">0:00</span>
                    </div>

                    <div class="volume-area">
                        <span class="vol-icon"
                            ><i class="bi bi-volume-up"></i
                        ></span>
                        <input
                            type="range"
                            id="volumeSlider"
                            min="0"
                            max="100"
                            value="80"
                        />
                    </div>
                </div>
            </div>

            <div class="sidebar" id="sidebar">
                <div class="sidebar-header">
                    <div class="search-bar">
                        <i class="bi bi-search search-icon"></i>
                        <input type="text" id="searchInput" placeholder="" />
                        <div class="search-toggle">
                            <button
                                class="st-btn active"
                                data-source="youtube"
                                id="srcYt"
                                title="YouTube"
                            >
                                <i class="bi bi-youtube"></i>
                            </button>
                            <button
                                class="st-btn"
                                data-source="local"
                                id="srcLocal"
                                title="Local"
                            >
                                <i class="bi bi-hdd"></i>
                            </button>
                        </div>
                    </div>
                    <div class="sidebar-tabs">
                        <button
                            class="tab active"
                            data-tab="search"
                            title="Search"
                        >
                            <i class="bi bi-search"></i>Search
                        </button>
                        <button class="tab" data-tab="local" title="Local">
                            <i class="bi bi-folder2-open"></i>Local
                        </button>
                        <button class="tab" data-tab="liked" title="Liked">
                            <i class="bi bi-heart"></i>Liked
                        </button>
                        <button id="settingsBtn" class="tab" title="Settings">
                            <i class="bi bi-gear"></i>
                        </button>
                    </div>
                </div>
                <div class="sidebar-content" id="sidebarContent">
                    <div class="tab-content active" id="tabSearch">
                        <div id="resultsContainer" class="results-grid"></div>
                    </div>
                    <div class="tab-content" id="tabLocal">
                        <div class="local-actions">
                            <button
                                id="scanLocalBtn"
                                class="local-btn"
                                title="Scan"
                            >
                                <i class="bi bi-arrow-clockwise"></i>
                            </button>
                        </div>
                        <div class="albums-grid" id="albumsGrid"></div>
                        <div class="album-songs" id="albumSongs"></div>
                        <div class="local-songs" id="localSongs"></div>
                    </div>
                    <div class="tab-content" id="tabLiked">
                        <div id="likedSongs" class="results-grid"></div>
                    </div>
                </div>
            </div>

            <div id="bottomQueue">
                <div id="queueBar">
                    <div class="queue-bar-left">
                        <span class="queue-bar-label">Next</span>
                        <img
                            id="queueBarArt"
                            src="/static/Frame%201.jpg"
                            alt=""
                        />
                        <div class="queue-bar-info">
                            <span id="queueBarTitle"></span>
                            <span id="queueBarCount"></span>
                        </div>
                    </div>
                    <div class="queue-bar-right">
                        <label class="autoplay-toggle" title="Auto-play">
                            <input
                                type="checkbox"
                                id="autoPlayToggle"
                                checked
                            />
                            <span class="toggle-slider"></span>
                        </label>
                        <button id="queueBarExpand" title="Queue">
                            <i class="bi bi-list-ul"></i>
                        </button>
                    </div>
                </div>
                <div id="queueOverlay" class="hidden">
                    <div class="queue-overlay-header">
                        <span class="queue-overlay-title"
                            ><i class="bi bi-list-ul"></i
                        ></span>
                        <div class="queue-overlay-actions">
                            <button
                                id="clearQueueBtn"
                                class="local-btn"
                                title="Clear"
                            >
                                <i class="bi bi-trash"></i>
                            </button>
                            <button
                                id="saveQueueBtn"
                                class="local-btn"
                                title="Save"
                            >
                                <i class="bi bi-floppy"></i>
                            </button>
                            <button id="queueOverlayClose">
                                <i class="bi bi-x-lg"></i>
                            </button>
                        </div>
                    </div>
                    <div id="queueContainer" class="results-grid"></div>
                </div>
            </div>

            <div class="mini-player" id="miniPlayer">
                <img id="miniArt" src="/static/Frame%201.jpg" alt="" />
                <div class="mini-info">
                    <span id="miniTitle"></span>
                    <span id="miniArtist"></span>
                </div>
                <div class="mini-controls">
                    <button id="miniPlayBtn" class="mini-ctrl">
                        <i class="bi bi-play-fill"></i>
                    </button>
                    <button id="miniExpandBtn" class="mini-ctrl">
                        <i class="bi bi-arrows-fullscreen"></i>
                    </button>
                </div>
            </div>

            <div class="modal-overlay" id="settingsModal">
                <div class="modal">
                    <div class="modal-header">
                        <h2><i class="bi bi-sliders"></i></h2>
                        <button id="closeSettings" class="modal-close">
                            <i class="bi bi-x-lg"></i>
                        </button>
                    </div>
                    <div class="modal-body">
                        <div class="setting-group">
                            <label><i class="bi bi-palette"></i> Theme</label>
                            <select id="setTheme">
                                <option value="dark">Dark</option>
                                <option value="light">Light</option>
                                <option value="neon">Neon</option>
                                <option value="retro">Retro</option>
                            </select>
                        </div>
                        <div class="setting-group">
                            <label
                                ><i class="bi bi-circle-fill"></i> Accent</label
                            >
                            <input
                                type="color"
                                id="setAccent"
                                value="#6c63ff"
                            />
                        </div>
                        <div class="setting-group">
                            <label><i class="bi bi-eyedropper"></i> Blur</label>
                            <input
                                type="range"
                                id="setBgBlur"
                                min="0"
                                max="30"
                                value="10"
                            />
                        </div>
                        <div class="setting-group">
                            <label><i class="bi bi-moon"></i> Dim</label>
                            <input
                                type="range"
                                id="setBgDim"
                                min="0"
                                max="100"
                                value="60"
                            />
                        </div>
                        <div class="setting-group">
                            <label
                                ><i class="bi bi-volume-up"></i> Volume</label
                            >
                            <input
                                type="range"
                                id="setVolume"
                                min="0"
                                max="100"
                                value="80"
                            />
                        </div>
                        <div class="setting-group">
                            <label
                                ><i class="bi bi-arrow-repeat"></i>
                                Crossfade</label
                            >
                            <input
                                type="number"
                                id="setCrossfade"
                                min="0"
                                max="10"
                                value="2"
                            />
                        </div>
                        <div class="setting-group">
                            <label
                                ><input type="checkbox" id="setMiniOnBlur" />
                                Minimize on blur</label
                            >
                        </div>
                        <div class="setting-group">
                            <label
                                ><i class="bi bi-broadcast"></i> Source</label
                            >
                            <select id="setDefaultSource">
                                <option value="youtube">YouTube</option>
                                <option value="local">Local</option>
                            </select>
                        </div>
                        <div class="setting-group">
                            <label
                                ><i class="bi bi-folder"></i> Download
                                Path</label
                            >
                            <input
                                type="text"
                                id="setDownloadPath"
                                value="~/.flow/downloads"
                            />
                        </div>
                        <button
                            id="resetSettings"
                            class="local-btn"
                            style="margin-top: 12px; width: 100%"
                            title="Reset"
                        >
                            <i class="bi bi-arrow-counterclockwise"></i>
                        </button>
                    </div>
                    <div class="modal-footer">
                        <button
                            id="saveSettings"
                            class="local-btn primary-btn"
                            title="Save"
                        >
                            <i class="bi bi-check-lg"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <audio id="audioPlayer" preload="metadata"></audio>
        <div id="toast" class="toast"></div>
        <script src="/static/script.js"></script>
    </body>
</html>
