<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flow - Settings</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body { padding: 40px 20px; height: auto; min-height: 100vh; overflow-y: auto; }
    .settings-page { max-width: 600px; margin: 0 auto; }
  </style>
</head>
<body>
  <div class="settings-page">
    <h1 style="margin-bottom:24px;font-size:24px;"><i class="bi bi-sliders" style="color:var(--accent)"></i> Settings</h1>
    <p style="color:var(--text3);margin-bottom:24px;font-size:13px;">
      Settings are also available in the player. <a href="/" style="color:var(--accent)">Back to player</a>
    </p>
    <div id="settingsContainer"></div>
  </div>
  <script>
    fetch('/api/settings').then(r=>r.json()).then(data=>{
      const c = document.getElementById('settingsContainer');
      c.innerHTML = '<pre style="background:var(--surface);padding:20px;border-radius:12px;font-size:13px;overflow:auto;">'+JSON.stringify(data, null, 2)+'</pre>';
    });
  </script>
</body>
</html>
